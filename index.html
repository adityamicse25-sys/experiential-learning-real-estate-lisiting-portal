<html>
<head>
<title>Skyline Properties</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
padding: 20px;
background-color: #f8f9fa;
}
table td {
background: white;
border-radius: 10px;
}
table td:hover {
transform: scale(1.05);
}
h3 {
color: #0d6efd;
}
</style>

</head>

<body>

<center>
<h2 class="text-primary">Skyline Properties</h2>
</center>

<label class="fw-bold">Select BHK:</label>
<select class="form-select w-25 mb-3">
<option>All</option>
<option>1 BHK</option>
<option>2 BHK</option>
<option>3 BHK</option>
</select>

<table class="table table-bordered text-center">
<tr>

<td>
<h3>2 BHK Flat</h3>
<p>Pune - ₹70 Lakhs</p>
<button class="btn btn-primary" onclick="showDetails('2 BHK Flat','Pune','₹70 Lakhs','Spacious flat with parking and balcony')">View</button>
</td>

<td>
<h3>3 BHK Villa</h3>
<p>Mumbai - ₹1.2 Cr</p>
<button class="btn btn-success" onclick="showDetails('3 BHK Villa','Mumbai','₹1.2 Cr','Luxury villa with garden and pool')">View</button>
</td>

<td>
<h3>1 BHK Apartment</h3>
<p>Nagpur - ₹40 Lakhs</p>
<button class="btn btn-danger" onclick="showDetails('1 BHK Apartment','Nagpur','₹40 Lakhs','Affordable apartment in city area')">View</button>
</td>

</tr>
</table>

<!-- Modal -->
<div class="modal fade" id="propertyModal">
<div class="modal-dialog">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title" id="modalTitle">Property</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<p id="modalLocation"></p>
<p id="modalPrice"></p>
<p id="modalDesc"></p>
</div>

</div>
</div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function showDetails(name, location, price, desc) {
document.getElementById("modalTitle").innerHTML = name;
document.getElementById("modalLocation").innerHTML = "Location: " + location;
document.getElementById("modalPrice").innerHTML = "Price: " + price;
document.getElementById("modalDesc").innerHTML = "Details: " + desc;

// show modal
var myModal = new bootstrap.Modal(document.getElementById('propertyModal'));
myModal.show();
}
</script>

</body>
</html>
